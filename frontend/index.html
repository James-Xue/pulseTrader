<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pulseTrader Dashboard</title>
</head>
<body>
    <div id="app">
        <!-- Halt banner -->
        <div id="halt-banner" class="halt-banner hidden">
            <strong>TRADING HALTED</strong>
            <span id="halt-reason"></span>
        </div>

        <!-- Header -->
        <header>
            <h1>pulseTrader</h1>
            <div class="header-right">
                <!-- Menu bar -->
                <div id="menu-bar" class="menu-bar">
                    <button id="menu-panels-btn" class="menu-btn">☰ Panels ▾</button>
                    <div id="menu-panels-dropdown" class="menu-dropdown hidden">
                        <label class="menu-item"><input type="checkbox" data-panel="order-book" checked> Order Book</label>
                        <label class="menu-item"><input type="checkbox" data-panel="kline" checked> K-Line Chart</label>
                        <label class="menu-item"><input type="checkbox" data-panel="positions" checked> Positions</label>
                        <label class="menu-item"><input type="checkbox" data-panel="orders" checked> Orders</label>
                        <label class="menu-item"><input type="checkbox" data-panel="metrics" checked> PnL &amp; Metrics</label>
                        <label class="menu-item"><input type="checkbox" data-panel="ai-analysis" checked> AI Analysis</label>
                        <label class="menu-item"><input type="checkbox" data-panel="strategies" checked> Strategies</label>
                        <label class="menu-item"><input type="checkbox" data-panel="risk" checked> Risk Status</label>
                        <div class="menu-divider"></div>
                        <button id="menu-reset-btn" class="menu-reset-btn">↺ Reset Layout</button>
                    </div>
                </div>
                <!-- Connection status -->
                <div id="connection-status" class="status-disconnected">
                    <span class="status-dot"></span>
                    <span id="status-text">Disconnected</span>
                </div>
            </div>
        </header>

        <!-- Account balance bar -->
        <div id="account-bar" class="account-bar hidden">
            <span class="account-group">
                <span class="account-group-label">📈 Futures</span>
                <span class="account-item">
                    <span class="account-label">Total</span>
                    <span class="account-value" id="account-total">—</span>
                </span>
                <span class="account-item">
                    <span class="account-label">Available</span>
                    <span class="account-value" id="account-available">—</span>
                </span>
                <span class="account-item">
                    <span class="account-label">Unrealized PnL</span>
                    <span class="account-value" id="account-pnl">—</span>
                </span>
                <span class="account-item">
                    <span class="account-label">Margin Used</span>
                    <span class="account-value" id="account-margin">—</span>
                </span>
            </span>
            <span class="account-divider"></span>
            <span class="account-group">
                <span class="account-group-label">💰 Spot</span>
                <span class="account-item">
                    <span class="account-label">Total</span>
                    <span class="account-value" id="account-spot-total">—</span>
                </span>
                <span class="account-item">
                    <span class="account-label">Available</span>
                    <span class="account-value" id="account-spot-available">—</span>
                </span>
            </span>
        </div>

        <!-- Golden Layout container -->
        <div id="layout-container"></div>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
